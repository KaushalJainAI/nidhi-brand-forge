# The host nginx terminates TLS and proxies here over plain HTTP, so $scheme is
# always "http" inside this container. Forwarding $scheme would overwrite the
# host's "X-Forwarded-Proto: https" and leave Django's SECURE_PROXY_SSL_HEADER
# permanently seeing http. Honour the incoming header; fall back to $scheme only
# when there is no upstream proxy (local dev hitting :3000 directly).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

upstream backend {
    server backend:8000;
}

upstream admin_panel {
    server admin-panel:80;
}

# Proxy cache configuration
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=s3_cache:10m max_size=1g inactive=60m use_temp_path=off;
proxy_temp_path /var/cache/nginx/temp;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SEO files come from the backend so the sitemap reflects the live catalog.
    # Must be declared before the SPA catch-all, which would otherwise serve
    # index.html for /sitemap.xml and hand crawlers HTML instead of XML.
    location = /sitemap.xml {
        proxy_pass http://backend/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location = /robots.txt {
        proxy_pass http://backend/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # 1. Backend API
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_cache_bypass $http_upgrade;
        
        # Enable caching for media files in API responses if needed
        # But specifically proxy S3 below
        
        client_max_body_size 50M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy S3 bucket for better performance and caching
    location ^~ /s3-media/ {
        proxy_cache s3_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        
        proxy_ignore_headers Cache-Control Set-Cookie;
        proxy_hide_header Set-Cookie;
        
        # Proxy to the actual S3 bucket
        proxy_pass https://ngu-static-files0.s3.ap-south-1.amazonaws.com/;
        
        proxy_set_header Host ngu-static-files0.s3.ap-south-1.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-meta-server-side-encryption;
        proxy_hide_header x-amz-server-side-encryption;
        proxy_hide_header x-amz-version-id;
        
        # Intercept errors if S3 returns 404
        proxy_intercept_errors on;
        
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 2. Django Admin Interface
    location /admin/ {
        proxy_pass http://backend/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # 2b. Django static files (admin/DRF CSS+JS), served by WhiteNoise from the
    # backend. ^~ so /static/admin/*.css|js beats the regex asset-cache location
    # below; otherwise they'd resolve against the SPA filesystem and 404.
    location ^~ /static/ {
        proxy_pass http://backend/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # 3. Admin Panel - React App (accessed at /panel/)
    # ^~ so this prefix beats the regex asset-cache location below; otherwise
    # /panel/assets/*.js|css get caught by that regex and 404 from the frontend fs.
    location ^~ /panel/ {
        # The rewrite handles stripping /panel so the React app loads correctly
        rewrite ^/panel/(.*)$ /$1 break;
        proxy_pass http://admin_panel;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    # Runtime config must never be cached (regenerated per container start).
    # Exact-match location wins over the regex cache rule below, which would
    # otherwise pin /config.js for a year and freeze the runtime env.
    location = /config.js {
        add_header Cache-Control "no-store" always;
    }

    # 4. Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 5. Frontend SPA routing - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
